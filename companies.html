<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Companies · SmartSense CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="companies" class="">
  <div class="app">
    <div data-sidebar></div>
    <main class="main">
      <div class="topbar">
        <div class="breadcrumb"><span>Records</span><span class="sep">/</span><span class="current">Companies</span></div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications">○</button>
          <button class="icon-btn" title="Help">?</button>
        </div>
      </div>
      <div class="content">

  <div class="page-header">
    <div>
      <div class="eyebrow">M1 · F1.1</div>
      <h1 class="page-title mt-2">Companies</h1>
      <div class="page-sub" id="companies-sub">Loading companies...</div>
    </div>
    <div class="row gap-2">
      <button class="btn" onclick="window.location.href='import.html'">Import</button>
      <button class="btn primary" id="new-company-btn">+ New company</button>
    </div>
  </div>

  <div class="row mb-4 gap-3">
    <div class="tab-bar">
      <a href="contacts.html">Contacts</a>
      <a href="companies.html" class="active">Companies</a>
    </div>
    <div class="row gap-2">
      <button class="btn sm">+ Add filter</button>
    </div>
    <div style="margin-left: auto;" class="row gap-2">
      <span class="text-mono text-muted" style="font-size: 11px;" id="companies-count"></span>
    </div>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th style="width: 24px;"><input type="checkbox" /></th>
        <th>Company</th>
        <th>Industry</th>
        <th>Size</th>
        <th>Open deals</th>
        <th class="num">Pipeline value</th>
        <th>Owner</th>
      </tr>
    </thead>
    <tbody id="companies-tbody">
      <tr>
        <td colspan="7" style="text-align:center; padding:40px; color:var(--ink-50);">
          Loading...
        </td>
      </tr>
    </tbody>
  </table>

  <div class="row between mt-5">
    <div class="text-mono text-muted" style="font-size: 11px;" id="companies-footer"></div>
    <div class="row gap-2">
      <button class="btn sm">← Prev</button>
      <button class="btn sm">Next →</button>
    </div>
  </div>


      </div>
    </main>
  </div>

  <script src="assets/api.js"></script>
  <script>
    if (!SS_API.Auth.isLoggedIn()) window.location.href = "index.html";

    async function loadCompanies() {
      try {
        const data = await SS_API.Companies.list();
        const tbody = document.getElementById("companies-tbody");
        const sub = document.getElementById("companies-sub");
        const count = document.getElementById("companies-count");
        const footer = document.getElementById("companies-footer");

        // Deduplicate by name (case-insensitive), keeping the record with the most contacts+deals
        var seen = new Map();
        data.companies.forEach(function(c) {
          var key = c.name.toLowerCase();
          var existing = seen.get(key);
          var score = (c._count ? c._count.contacts + c._count.deals : 0);
          var existingScore = existing ? (existing._count ? existing._count.contacts + existing._count.deals : 0) : -1;
          if (!existing || score > existingScore) seen.set(key, c);
        });
        var companies = Array.from(seen.values());

        sub.textContent = companies.length + " Companies · Live from database";
        count.textContent = companies.length + " RESULTS";
        footer.textContent = "SHOWING " + companies.length + " COMPANIES";

        if (companies.length === 0) {
          tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;padding:40px;color:var(--ink-50);'>No companies yet — import CSV or add your first company.</td></tr>";
          return;
        }


        tbody.innerHTML = companies.map(function(c) {
          var domain = c.domain ? "<div class='text-muted' style='font-size:11px;'>" + c.domain + "</div>" : "";
          var industry = c.industry || "—";
          var size = c.size || "—";
          var deals = c._count ? c._count.deals : "0";
          return "<tr style='cursor:pointer;' onclick=\"window.location.href='company-detail.html?id=" + c.id + "'\">" +
            "<td><input type='checkbox' onclick='event.stopPropagation()' /></td>" +
            "<td><strong>" + c.name + "</strong>" + domain + "</td>" +
            "<td>" + industry + "</td>" +
            "<td>" + size + "</td>" +
            "<td>" + deals + "</td>" +
            "<td class='num'>—</td>" +
            "<td>—</td>" +
            "</tr>";
        }).join("");

      } catch (err) {
        console.error("Failed to load companies:", err);
        document.getElementById("companies-tbody").innerHTML = "<tr><td colspan='7' style='text-align:center;padding:40px;color:var(--ink-50);'>Failed to load companies. Please refresh.</td></tr>";
      }
    }

    window.SS_loadCompanies = loadCompanies;
    loadCompanies();
  </script>
  <script src="assets/chrome.js"></script>
</body>
</html>
