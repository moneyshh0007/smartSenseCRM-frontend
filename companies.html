<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Companies · SmartSense CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="companies" class="">
  <div class="app">
    <div data-sidebar></div>
    <main class="main">
      <div class="topbar">
        <div class="breadcrumb"><span>Records</span><span class="sep">/</span><span class="current">Companies</span></div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications">○</button>
          <button class="icon-btn" title="Help">?</button>
        </div>
      </div>
      <div class="content">

  <div class="page-header">
    <div>
      <div class="eyebrow">M1 · F1.1</div>
      <h1 class="page-title mt-2">Companies</h1>
      <div class="page-sub" id="companies-sub">Loading companies...</div>
    </div>
    <div class="row gap-2">
      <button class="btn" onclick="window.location.href='import.html'">Import</button>
      <button class="btn primary" id="new-company-btn">+ New company</button>
    </div>
  </div>

  <div class="row mb-4 gap-3">
    <div class="tab-bar">
      <a href="contacts.html">Contacts</a>
      <a href="companies.html" class="active">Companies</a>
    </div>
    <div class="row gap-2">
      <button class="btn sm">+ Add filter</button>
    </div>
    <div style="margin-left: auto;" class="row gap-2">
      <span class="text-mono text-muted" style="font-size: 11px;" id="companies-count"></span>
    </div>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th style="width: 24px;"><input type="checkbox" /></th>
        <th>Company</th>
        <th>Industry</th>
        <th>Size</th>
        <th>Open deals</th>
        <th class="num">Pipeline value</th>
        <th>Owner</th>
      </tr>
    </thead>
    <tbody id="companies-tbody">
      <tr>
        <td colspan="7" style="text-align:center; padding:40px; color:var(--ink-50);">
          Loading...
        </td>
      </tr>
    </tbody>
  </table>

  <div class="row between mt-5">
    <div class="text-mono text-muted" style="font-size: 11px;" id="companies-footer"></div>
    <div class="row gap-2">
      <button class="btn sm">← Prev</button>
      <button class="btn sm">Next →</button>
    </div>
  </div>

  <!-- New Company Modal -->
  <div id="new-company-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width:480px; max-width:90vw; padding:24px; background:var(--paper);">
      <div class="row between mb-4">
        <div class="card-title">New company</div>
        <button onclick="document.getElementById('new-company-modal').style.display='none'" style="background:none;border:none;cursor:pointer;font-size:18px;">×</button>
      </div>
      <div id="new-company-error" style="display:none; background:#fee; border:1px solid #fcc; color:#c00; padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:12px;"></div>
      <div class="field">
        <label>Company name *</label>
        <input type="text" id="nc-name" placeholder="Acme Corp" />
      </div>
      <div class="field">
        <label>Domain</label>
        <input type="text" id="nc-domain" placeholder="acme.com" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Industry</label>
          <input type="text" id="nc-industry" placeholder="SaaS" />
        </div>
        <div class="field">
          <label>Size</label>
          <input type="number" id="nc-size" placeholder="500" />
        </div>
      </div>
      <div class="field">
        <label>HQ</label>
        <input type="text" id="nc-hq" placeholder="San Francisco" />
      </div>
      <div class="row gap-2 mt-4 between">
        <button class="btn" onclick="document.getElementById('new-company-modal').style.display='none'">Cancel</button>
        <button class="btn primary" id="nc-save-btn">Save company</button>
      </div>
    </div>
  </div>

      </div>
    </main>
  </div>

  <script src="assets/api.js"></script>
  <script>
    if (!SS_API.Auth.isLoggedIn()) window.location.href = "index.html";

    async function loadCompanies() {
      try {
        const data = await SS_API.Companies.list();
        const tbody = document.getElementById("companies-tbody");
        const sub = document.getElementById("companies-sub");
        const count = document.getElementById("companies-count");
        const footer = document.getElementById("companies-footer");

        sub.textContent = data.total + " Companies · Live from database";
        count.textContent = data.total + " RESULTS";
        footer.textContent = "SHOWING " + data.total + " COMPANIES";

        if (data.companies.length === 0) {
          tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;padding:40px;color:var(--ink-50);'>No companies yet — import CSV or add your first company.</td></tr>";
          return;
        }

        tbody.innerHTML = data.companies.map(function(c) {
          var domain = c.domain ? "<div class='text-muted' style='font-size:11px;'>" + c.domain + "</div>" : "";
          var industry = c.industry || "—";
          var size = c.size || "—";
          var deals = c._count ? c._count.deals : "0";
          return "<tr style='cursor:pointer;' onclick=\"window.location.href='company-detail.html?id=" + c.id + "'\">" +
            "<td><input type='checkbox' onclick='event.stopPropagation()' /></td>" +
            "<td><strong>" + c.name + "</strong>" + domain + "</td>" +
            "<td>" + industry + "</td>" +
            "<td>" + size + "</td>" +
            "<td>" + deals + "</td>" +
            "<td class='num'>—</td>" +
            "<td>—</td>" +
            "</tr>";
        }).join("");

      } catch (err) {
        console.error("Failed to load companies:", err);
        document.getElementById("companies-tbody").innerHTML = "<tr><td colspan='7' style='text-align:center;padding:40px;color:var(--ink-50);'>Failed to load companies. Please refresh.</td></tr>";
      }
    }

    document.getElementById("new-company-btn").addEventListener("click", function() {
      document.getElementById("new-company-modal").style.display = "flex";
    });

    document.getElementById("nc-save-btn").addEventListener("click", async function() {
      var name = document.getElementById("nc-name").value.trim();
      var domain = document.getElementById("nc-domain").value.trim();
      var industry = document.getElementById("nc-industry").value.trim();
      var size = document.getElementById("nc-size").value;
      var hq = document.getElementById("nc-hq").value.trim();
      var errEl = document.getElementById("new-company-error");
      var btn = document.getElementById("nc-save-btn");

      if (!name) {
        errEl.textContent = "Company name is required.";
        errEl.style.display = "block";
        return;
      }

      btn.textContent = "Saving...";
      btn.disabled = true;
      errEl.style.display = "none";

      try {
        var payload = { name: name };
        if (domain) payload.domain = domain;
        if (industry) payload.industry = industry;
        if (size) payload.size = Number(size);
        if (hq) payload.hq = hq;

        await SS_API.Companies.create(payload);
        document.getElementById("new-company-modal").style.display = "none";
        ["nc-name","nc-domain","nc-industry","nc-size","nc-hq"].forEach(function(id) {
          document.getElementById(id).value = "";
        });
        btn.textContent = "Save company";
        btn.disabled = false;
        loadCompanies();
      } catch (err) {
        errEl.textContent = err.message || "Failed to save company.";
        errEl.style.display = "block";
        btn.textContent = "Save company";
        btn.disabled = false;
      }
    });

    loadCompanies();
  </script>
  <script src="assets/chrome.js"></script>
</body>
</html>
