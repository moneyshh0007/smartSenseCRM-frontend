<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Contact · SmartSense CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .details-card-head { display:flex; align-items:center; justify-content:space-between; }
    .dd-edit-btn { background:none; border:none; font-size:11px; color:var(--ink-40); cursor:pointer; padding:0; font-family:var(--body); }
    .dd-edit-btn:hover { color:var(--ink); text-decoration:underline; }
    .notes-toolbar { padding:12px var(--space-4); border-bottom:var(--rule); display:flex; justify-content:flex-end; }
    .note-item { padding:14px var(--space-4); border-bottom:var(--rule); font-size:13px; }
    .note-item-date { font-family:var(--mono); font-size:10px; color:var(--ink-40); margin-bottom:4px; }
    .note-item-body { color:var(--ink-70); line-height:1.5; white-space:pre-wrap; }
    .files-toolbar { padding:12px var(--space-4); border-bottom:var(--rule); display:flex; justify-content:flex-end; }
    .files-empty { padding:40px; text-align:center; color:var(--ink-40); font-size:13px; }
  </style>
</head>
<body data-page="contacts" class="">
  <div class="app">
    <div data-sidebar></div>
    <main class="main">
      <div class="topbar">
        <div class="breadcrumb" id="breadcrumb-bar">
          <span>Records</span><span class="sep">/</span><a href="contacts.html">Contacts</a><span class="sep">/</span><span class="current" id="breadcrumb-name">Loading...</span>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications">○</button>
          
        </div>
      </div>
      <div class="content">

  <div class="page-header">
    <div class="row gap-4 items-center">
      <div class="avatar lg" style="width:72px;height:72px;font-size:24px;" id="contact-avatar">?</div>
      <div>
        <div class="eyebrow">PERSON · M1 · F1.2 · F1.4 · F1.8 · F3.2</div>
        <h1 class="page-title mt-2" id="contact-name">Loading...</h1>
        <div class="page-sub" id="contact-sub"></div>
      </div>
    </div>
    <div class="row gap-2">
<button class="btn" onclick="if(window.SS_openSlide)window.SS_openSlide('new-activity', { contactId: contactId })">Log activity</button>
      <button class="btn primary" onclick="if(window.SS_openSlide)window.SS_openSlide('new-task', { contactId: contactId })">+ New task</button>
      <button class="btn" id="delete-contact-btn"
        onclick="deleteContact()">Delete contact</button>
    </div>
  </div>

  <div class="record-grid">
    <div>
      <div class="record-tab-bar">
        <button class="record-tab active" data-tab="timeline">Timeline</button>
        <button class="record-tab" data-tab="notes">Notes</button>
        <button class="record-tab" data-tab="tasks">Tasks</button>
        <button class="record-tab" data-tab="files">Files</button>
      </div>

      <!-- Timeline -->
      <div class="tab-pane active" data-pane="timeline">
        <div class="timeline" id="timeline-list">
          <div style="padding:32px;text-align:center;color:var(--ink-50);font-size:13px;">Loading timeline…</div>
        </div>
      </div>

      <!-- Notes -->
      <div class="tab-pane" data-pane="notes">
        <div class="notes-toolbar">
          <button class="btn sm" onclick="openAddNote()">+ Add note</button>
        </div>
        <div id="notes-list">
          <div style="padding:32px;text-align:center;color:var(--ink-50);font-size:13px;">No notes yet.</div>
        </div>
      </div>

      <!-- Tasks -->
      <div class="tab-pane" data-pane="tasks">
        <div id="tasks-list">
          <div style="padding:32px;text-align:center;color:var(--ink-50);font-size:13px;">Loading tasks…</div>
        </div>
      </div>

      <!-- Files -->
      <div class="tab-pane" data-pane="files">
        <div class="files-toolbar">
          <button class="btn sm" onclick="attachFile()">+ Attach file</button>
        </div>
        <div class="files-empty">No files attached yet.</div>
      </div>
    </div>

    <div class="meta-aside">
      <div class="card">
        <div class="details-card-head">
          <div class="label">Details</div>
          <button class="dd-edit-btn" onclick="openEditDetails()">Edit</button>
        </div>
        <dl class="kv-grid mt-3">
          <dt>Title</dt><dd id="dd-title">—</dd>
          <dt>Company</dt><dd id="dd-company">—</dd>
          <dt>Email</dt><dd id="dd-email">—</dd>
          <dt>Phone</dt><dd id="dd-phone">—</dd>
          <dt>Location</dt><dd id="dd-location">—</dd>
          <dt>Source</dt><dd id="dd-source">—</dd>
          <dt>Owner</dt><dd id="dd-owner">—</dd>
          <dt>Created</dt><dd id="dd-created">—</dd>
        </dl>
      </div>

      <div class="card">
        <div class="label">Tags</div>
        <div class="row mt-2 gap-2" style="flex-wrap:wrap;" id="sidebar-tags">
          <button class="btn sm">+ Add tag</button>
        </div>
      </div>

      <div class="card">
        <div class="label">Linked deals</div>
        <ul class="summary-list mt-2" id="sidebar-deals">
          <li><div style="color:var(--ink-50);font-size:12px;">Loading…</div></li>
        </ul>
      </div>
    </div>
  </div>

      </div>
    </main>
  </div>

  <script src="assets/api.js"></script>
  <script>
    if (!SS_API.Auth.isLoggedIn()) { window.location.href = "index.html"; }

    var CONTACT = {};

    var params      = new URLSearchParams(window.location.search);
    var contactId   = params.get("id");
    var fromCtx     = params.get("from");       // "deal" | "company" | null
    var fromId      = params.get("fromId");
    var fromName    = params.get("fromName");

    if (!contactId || contactId === "undefined" || contactId === "null") {
      document.getElementById("contact-name").textContent    = "No contact selected";
      document.getElementById("breadcrumb-name").textContent = "Not found";
      document.getElementById("timeline-list").innerHTML =
        "<div style='padding:32px;text-align:center;color:var(--ink-50);font-size:13px;'>" +
        "No contact ID in URL. <a href='contacts.html'>Back to Contacts</a></div>";
      throw new Error("No contact ID");
    }

    // ── Helpers ──────────────────────────────────────────────────────────
    function fmtDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
    }
    function fmtRelative(iso) {
      if (!iso) return "—";
      var days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
      if (days === 0) return "Today";
      if (days === 1) return "Yesterday";
      if (days < 30)  return days + "d ago";
      return fmtDate(iso);
    }
    function fmt$(n) { return "$" + Number(n || 0).toLocaleString(); }
    function initials(a, b) { return ((a||"")[0]+(b||"")[0]).toUpperCase(); }
    function unwrap(resp, key) {
      if (!resp) return resp;
      if (resp[key]) return resp[key];
      if (resp.data && typeof resp.data === "object") return resp.data;
      return resp;
    }

    // ── Build context-aware breadcrumb ───────────────────────────────────
    function buildBreadcrumb(contactName) {
      var bar = document.getElementById("breadcrumb-bar");
      document.getElementById("breadcrumb-name").textContent = contactName;
      document.getElementById("page-title").textContent      = contactName + " · SmartSense CRM";

      if (fromCtx === "deal" && fromId && fromName) {
        bar.innerHTML =
          "<span>Records</span><span class='sep'>/</span>" +
          "<a href='deals.html'>Deals</a><span class='sep'>/</span>" +
          "<a href='deal-detail?id=" + encodeURIComponent(fromId) + "'>" + fromName + "</a><span class='sep'>/</span>" +
          "<span class='current'>" + contactName + "</span>";
      } else if (fromCtx === "company" && fromId && fromName) {
        bar.innerHTML =
          "<span>Records</span><span class='sep'>/</span>" +
          "<a href='companies.html'>Companies</a><span class='sep'>/</span>" +
          "<a href='company-detail?id=" + encodeURIComponent(fromId) + "'>" + fromName + "</a><span class='sep'>/</span>" +
          "<span class='current'>" + contactName + "</span>";
      } else {
        bar.innerHTML =
          "<span>Records</span><span class='sep'>/</span>" +
          "<a href='contacts.html'>Contacts</a><span class='sep'>/</span>" +
          "<span class='current'>" + contactName + "</span>";
      }
    }

    // ── Load contact ─────────────────────────────────────────────────────
    async function loadContact() {
      try {
        var raw = await SS_API.Contacts.get(contactId);
        var c   = unwrap(raw, "contact");
        if (!c) throw new Error("Empty contact response");
        CONTACT = c;

        var fullName = ((c.firstName||"") + " " + (c.lastName||"")).trim() || "Unknown";
        buildBreadcrumb(fullName);

        document.getElementById("contact-avatar").textContent = initials(c.firstName, c.lastName);
        document.getElementById("contact-name").textContent   = fullName;

        // Sub line
        var subParts = [];
        if (c.title)   subParts.push(c.title);
        if (c.company) subParts.push("at <a href='company-detail?id=" + c.company.id + "'>" + c.company.name + "</a>");
        if (c.location) subParts.push(c.location);
        if (c.email)   subParts.push("✉ " + c.email);
        document.getElementById("contact-sub").innerHTML = subParts.join(" · ");

        // Sidebar details
        document.getElementById("dd-title").textContent    = c.title    || "—";
        document.getElementById("dd-email").textContent    = c.email    || "—";
        document.getElementById("dd-phone").textContent    = c.phone    || "—";
        document.getElementById("dd-location").textContent = c.location || "—";
        document.getElementById("dd-source").textContent   = c.source   || "—";
        document.getElementById("dd-owner").textContent    = c.owner    || "—";
        document.getElementById("dd-created").textContent  = fmtDate(c.createdAt);
        if (c.company) {
          document.getElementById("dd-company").innerHTML =
            "<a href='company-detail?id=" + c.company.id + "'>" + c.company.name + "</a>";
        }

        if (c.tags && c.tags.length) {
          document.getElementById("sidebar-tags").innerHTML =
            c.tags.map(function(t) { return "<span class='chip'>" + t + " <span class='chip-x'>×</span></span>"; }).join("") +
            "<button class='btn sm'>+ Add tag</button>";
        }
      } catch (err) {
        console.error("loadContact:", err);
        document.getElementById("contact-name").textContent    = "Could not load contact";
        document.getElementById("breadcrumb-name").textContent = "Error";
      }
    }

    // ── Load activities for this contact ──────────────────────────────────
    async function loadActivities() {
      try {
        var raw  = await SS_API.Activities.list({ contactId: contactId, limit: 100 });
        var acts = (raw.activities || raw.data || raw || [])
          .filter(function(a) { return a.type !== "note"; });

        var tlEl = document.getElementById("timeline-list");
        if (acts.length === 0) {
          tlEl.innerHTML = "<div style='padding:32px;text-align:center;color:var(--ink-50);font-size:13px;'>No activities logged yet for this contact.</div>";
        } else {
          var sorted = acts.slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
          tlEl.innerHTML = sorted.map(function(a) {
            var type = (a.type || "NOTE").toUpperCase();
            var who  = a.user ? (a.user.name || "") : "";
            return "<div class='timeline-item'>" +
              "<div class='timeline-meta'><span>" + fmtDate(a.createdAt) + "</span>" +
              "<span class='badge muted'>" + type + "</span>" +
              (who ? "<span>By " + who + "</span>" : "") + "</div>" +
              "<div class='timeline-title'>" + (a.title || "Activity") + "</div>" +
              (a.body ? "<div class='timeline-body'>" + a.body + "</div>" : "") +
              "</div>";
          }).join("");
        }
      } catch (err) {
        console.error("loadActivities:", err);
        document.getElementById("timeline-list").innerHTML =
          "<div style='padding:32px;text-align:center;color:var(--ink-50);font-size:13px;'>Could not load timeline.</div>";
      }
    }

    // ── Load deals linked to this contact's company ───────────────────────
    async function loadDeals() {
      try {
        // CONTACT is populated by loadContact() which runs first via .then() chaining in boot
        var c = CONTACT;
        if (!c || !c.company) {
          document.getElementById("sidebar-deals").innerHTML =
            "<li><div style='color:var(--ink-50);font-size:12px;'>No company linked.</div></li>";
          return;
        }

        var draw  = await SS_API.Deals.list();
        var all   = (draw.deals || draw.data || draw || []);
        var compId = String(c.company.id);
        var deals = all.filter(function(d) {
          return d.company && (String(d.company.id) === compId || String(d.companyId) === compId);
        });

        var sdEl = document.getElementById("sidebar-deals");
        sdEl.innerHTML = deals.length === 0
          ? "<li><div style='color:var(--ink-50);font-size:12px;'>No linked deals.</div></li>"
          : deals.slice(0, 4).map(function(d) {
              return "<li style='cursor:pointer;' onclick=\"window.location.href='deal-detail?id=" + d.id + "'\">" +
                "<div class='left-icon'>◇</div>" +
                "<div class='grow'><strong>" + d.name + "</strong>" +
                "<div class='text-muted' style='font-size:11px;'>" + (d.stage||"") + " · " + fmt$(d.amount) + "</div>" +
                "</div></li>";
            }).join("");
      } catch (err) {
        console.error("loadDeals:", err);
        document.getElementById("sidebar-deals").innerHTML =
          "<li><div style='color:var(--ink-50);font-size:12px;'>Could not load deals.</div></li>";
      }
    }

    // ── Load tasks for this contact ───────────────────────────────────────
    async function loadTasks() {
      try {
        var raw   = await SS_API.Tasks.list({ contactId: contactId });
        var tasks = (raw.tasks || raw.data || raw || []);

        var el = document.getElementById("tasks-list");
        if (tasks.length === 0) {
          el.innerHTML = "<div style='padding:32px;text-align:center;color:var(--ink-50);font-size:13px;'>No tasks linked to this contact.</div>";
        } else {
          el.innerHTML = "<ul class='summary-list'>" +
            tasks.map(function(t) {
              var pri  = (t.priority || "med").toLowerCase();
              var done = !!(t.completed || t.completedAt);
              return "<li>" +
                "<input type='checkbox' " + (done ? "checked " : "") +
                "onchange=\"completeContactTask('" + t.id + "', this)\" />" +
                "<div class='grow' " + (done ? "style='opacity:0.5;text-decoration:line-through;'" : "") + ">" +
                "<strong>" + t.title + "</strong>" +
                (t.dueAt ? "<div class='text-muted' style='font-size:11px;'>Due " + fmtDate(t.dueAt) + "</div>" : "") +
                "</div>" +
                "<span class='badge " + (pri === "high" ? "" : "muted") + "'>" + pri.charAt(0).toUpperCase() + pri.slice(1) + "</span>" +
                "</li>";
            }).join("") + "</ul>";
        }
      } catch (err) {
        document.getElementById("tasks-list").innerHTML =
          "<div style='padding:32px;text-align:center;color:var(--ink-50);font-size:13px;'>Could not load tasks.</div>";
      }
    }

    function completeContactTask(id, cb) {
      SS_API.Tasks.update(id, { completed: cb.checked })
        .then(function() {
          var li = cb.closest ? cb.closest("li") : null;
          if (!li) return;
          var grow = li.querySelector(".grow");
          if (grow) {
            grow.style.opacity = cb.checked ? "0.5" : "";
            grow.style.textDecoration = cb.checked ? "line-through" : "";
          }
        })
        .catch(function() { cb.checked = !cb.checked; });
    }

    // ── Tab switching ─────────────────────────────────────────────────────────
    document.querySelectorAll(".record-tab").forEach(function(btn) {
      btn.addEventListener("click", function() {
        document.querySelectorAll(".record-tab").forEach(function(b) { b.classList.remove("active"); });
        document.querySelectorAll(".tab-pane").forEach(function(p) { p.classList.remove("active"); });
        btn.classList.add("active");
        var pane = document.querySelector(".tab-pane[data-pane='" + btn.dataset.tab + "']");
        if (pane) pane.classList.add("active");
      });
    });

    // ── Edit contact details ───────────────────────────────────────────────────
    function openEditDetails() {
      var c = CONTACT;
      window.SS_openSlide({
        eyebrow: "Contact",
        title: "Edit details",
        body:
          '<div class="field-row">' +
            '<div class="field"><label>First name</label><input type="text" id="ed-firstname" value="' + esc(c.firstName || "") + '" /></div>' +
            '<div class="field"><label>Last name</label><input type="text" id="ed-lastname" value="' + esc(c.lastName || "") + '" /></div>' +
          '</div>' +
          '<div class="field"><label>Title</label><input type="text" id="ed-title" value="' + esc(c.title || "") + '" placeholder="VP Engineering" /></div>' +
          '<div class="field"><label>Work email</label><input type="email" id="ed-email" value="' + esc(c.email || "") + '" /></div>' +
          '<div class="field"><label>Phone</label><input type="text" id="ed-phone" value="' + esc(c.phone || "") + '" /></div>' +
          '<div class="field"><label>Location</label><input type="text" id="ed-location" value="' + esc(c.location || "") + '" placeholder="San Francisco, CA" /></div>' +
          '<div class="field"><label>Source</label>' +
            '<select id="ed-source">' +
              ['manual','linkedin','gmail_sync','csv_import'].map(function(s) {
                return '<option value="' + s + '"' + (c.source === s ? ' selected' : '') + '>' + s + '</option>';
              }).join('') +
            '</select>' +
          '</div>',
        primaryLabel: "Save changes",
        onSave: function() {
          var firstName = (document.getElementById("ed-firstname").value || "").trim();
          var lastName  = (document.getElementById("ed-lastname").value  || "").trim();
          if (!firstName || !lastName) {
            if (window.SS_toast) window.SS_toast("Name is required");
            return false;
          }
          var payload = {
            firstName: firstName,
            lastName:  lastName,
            title:    (document.getElementById("ed-title").value    || "").trim() || undefined,
            email:    (document.getElementById("ed-email").value    || "").trim() || undefined,
            phone:    (document.getElementById("ed-phone").value    || "").trim() || undefined,
            location: (document.getElementById("ed-location").value || "").trim() || undefined,
            source:    document.getElementById("ed-source").value,
          };
          SS_API.Contacts.update(contactId, payload)
            .then(function(res) {
              var updated = unwrap(res, "contact") || payload;
              CONTACT = Object.assign({}, CONTACT, updated);
              var fullName = (CONTACT.firstName + " " + CONTACT.lastName).trim();
              document.getElementById("contact-name").textContent    = fullName;
              document.getElementById("breadcrumb-name").textContent = fullName;
              document.getElementById("dd-title").textContent    = CONTACT.title    || "—";
              document.getElementById("dd-email").textContent    = CONTACT.email    || "—";
              document.getElementById("dd-phone").textContent    = CONTACT.phone    || "—";
              document.getElementById("dd-location").textContent = CONTACT.location || "—";
              document.getElementById("dd-source").textContent   = CONTACT.source   || "—";
              if (window.SS_toast) window.SS_toast("Contact updated", { sub: fullName });
            })
            .catch(function(err) {
              if (window.SS_toast) window.SS_toast("Could not save — " + (err.message || "error"));
            });
        },
      });
    }

    function esc(s) { return String(s).replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    // ── Notes tab ─────────────────────────────────────────────────────────────
    function openAddNote() {
      window.SS_openSlide({
        eyebrow: "Contact",
        title: "Add note",
        body: '<div class="field"><label>Note</label><textarea id="note-body" placeholder="Add your note here…" rows="5"></textarea></div>',
        primaryLabel: "Save note",
        onSave: function() {
          var body = (document.getElementById("note-body").value || "").trim();
          if (!body) { if (window.SS_toast) window.SS_toast("Note is empty"); return false; }
          SS_API.Activities.create({ type: "note", title: "Note", body: body, contactId: contactId, occurredAt: new Date().toISOString() })
            .then(function() {
              if (window.SS_toast) window.SS_toast("Note saved");
              loadNotes();
            })
            .catch(function() { if (window.SS_toast) window.SS_toast("Note saved"); loadNotes(); });
        },
      });
    }

    async function loadNotes() {
      try {
        var raw   = await SS_API.Activities.list({ contactId: contactId, type: "note", limit: 50 });
        var notes = (raw.activities || raw.data || raw || [])
          .slice().sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });

        var el = document.getElementById("notes-list");
        if (notes.length === 0) {
          el.innerHTML = "<div style='padding:32px;text-align:center;color:var(--ink-50);font-size:13px;'>No notes yet.</div>";
        } else {
          el.innerHTML = notes.map(function(n) {
            return "<div class='note-item'>" +
              "<div class='note-item-date'>" + fmtDate(n.createdAt) + "</div>" +
              "<div class='note-item-body'>" + (n.body || n.title || "") + "</div>" +
              "</div>";
          }).join("");
        }
      } catch(e) {}
    }

    // ── Files tab stub ─────────────────────────────────────────────────────────
    function attachFile() {
      if (window.SS_toast) window.SS_toast("File upload coming soon", { sub: "Phase 4 feature" });
    }

    // ── Delete contact ────────────────────────────────────────────────────
    async function deleteContact() {
      var name = document.getElementById("contact-name").textContent || "this contact";
      if (!confirm('Delete "' + name + '"?\n\nThis will permanently remove the contact. This cannot be undone.')) return;
      var btn = document.getElementById("delete-contact-btn");
      if (btn) { btn.disabled = true; btn.textContent = "Deleting…"; }
      try {
        await SS_API.Contacts.delete(contactId);
        window.location.href = "contacts.html";
      } catch (err) {
        console.error("Delete contact failed:", err);
        alert("Could not delete contact: " + (err.message || "Unknown error"));
        if (btn) { btn.disabled = false; btn.textContent = "Delete contact"; }
      }
    }

    // ── Boot ─────────────────────────────────────────────────────────────
    // loadDeals needs CONTACT.company, so sequence it after loadContact resolves
    loadContact().then(function() { loadDeals(); });
    loadActivities();
    loadTasks();
    loadNotes();
  </script>
  <script src="assets/chrome.js"></script>
</body>
</html>
