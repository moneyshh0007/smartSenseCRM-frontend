<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contacts · SmartSense CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="contacts" class="">
  <div class="app">
    <div data-sidebar></div>
    <main class="main">
      <div class="topbar">
        <div class="breadcrumb"><span>Records</span><span class="sep">/</span><span class="current">Contacts</span></div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications">○</button>
          <button class="icon-btn" title="Help">?</button>
        </div>
      </div>
      <div class="content">

  <div class="page-header">
    <div>
      <div class="eyebrow">M1 · F1.1 · F1.2 · F1.4 · F1.6</div>
      <h1 class="page-title mt-2">Contacts</h1>
      <div class="page-sub" id="contacts-sub">Loading contacts...</div>
    </div>
    <div class="row gap-2">
      <button class="btn" onclick="window.location.href='import.html'">Import CSV</button>
      <button class="btn" onclick="window.location.href='chrome-extension.html'">Capture from LinkedIn</button>
      <button class="btn primary" id="new-contact-btn">+ New contact</button>
    </div>
  </div>

  <div class="row mb-4 gap-3">
    <div class="tab-bar">
      <a href="contacts.html" class="active">Contacts</a>
      <a href="companies.html">Companies</a>
    </div>
    <div class="row gap-2">
      <button class="btn sm">+ Add filter</button>
    </div>
    <div style="margin-left: auto;" class="row gap-2">
      <span class="text-mono text-muted" style="font-size: 11px;" id="contacts-count"></span>
    </div>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th style="width: 24px;"><input type="checkbox" /></th>
        <th>Name</th>
        <th>Title</th>
        <th>Company</th>
        <th>Created</th>
        <th>Owner</th>
        <th>Source</th>
      </tr>
    </thead>
    <tbody id="contacts-tbody">
      <tr>
        <td colspan="7" style="text-align:center; padding:40px; color:var(--ink-50);">
          Loading...
        </td>
      </tr>
    </tbody>
  </table>

  <div class="row between mt-5">
    <div class="text-mono text-muted" style="font-size: 11px;" id="contacts-footer"></div>
    <div class="row gap-2">
      <button class="btn sm">← Prev</button>
      <button class="btn sm">Next →</button>
    </div>
  </div>

  <!-- New Contact Modal -->
  <div id="new-contact-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width:480px; max-width:90vw; padding:24px; background:var(--paper);">
      <div class="row between mb-4">
        <div class="card-title">New contact</div>
        <button onclick="document.getElementById('new-contact-modal').style.display='none'" style="background:none;border:none;cursor:pointer;font-size:18px;">×</button>
      </div>
      <div id="new-contact-error" style="display:none; background:#fee; border:1px solid #fcc; color:#c00; padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:12px;"></div>
      <div class="field-row">
        <div class="field">
          <label>First name *</label>
          <input type="text" id="nc-firstname" placeholder="Sarah" />
        </div>
        <div class="field">
          <label>Last name *</label>
          <input type="text" id="nc-lastname" placeholder="Chen" />
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="nc-email" placeholder="sarah@acme.com" />
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="nc-title" placeholder="VP Engineering" />
      </div>
      <div class="field">
        <label>Phone</label>
        <input type="text" id="nc-phone" placeholder="+1 415 555 0117" />
      </div>
      <div class="field">
        <label>Location</label>
        <input type="text" id="nc-location" placeholder="San Francisco" />
      </div>
      <div class="row gap-2 mt-4 between">
        <button class="btn" onclick="document.getElementById('new-contact-modal').style.display='none'">Cancel</button>
        <button class="btn primary" id="nc-save-btn">Save contact</button>
      </div>
    </div>
  </div>

      </div>
    </main>
  </div>

  <script src="assets/api.js"></script>
  <script>
    if (!SS_API.Auth.isLoggedIn()) window.location.href = "index.html";

    async function loadContacts() {
      try {
        const data = await SS_API.Contacts.list();
        const tbody = document.getElementById("contacts-tbody");
        const sub = document.getElementById("contacts-sub");
        const count = document.getElementById("contacts-count");
        const footer = document.getElementById("contacts-footer");

        sub.textContent = data.total + " Contacts · Live from database";
        count.textContent = data.total + " RESULTS";
        footer.textContent = "SHOWING " + data.total + " CONTACTS";

        if (data.contacts.length === 0) {
          tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; padding:40px; color:var(--ink-50);'>No contacts yet — add your first contact.</td></tr>";
          return;
        }

        tbody.innerHTML = data.contacts.map(function(c) {
          var initials = c.firstName[0] + c.lastName[0];
          var company = c.company ? c.company.name : "—";
          var title = c.title || "—";
          var source = c.source || "manual";
          var date = new Date(c.createdAt).toLocaleDateString();
          return "<tr style='cursor:pointer;' onclick=\"window.location.href='contact-detail.html?id=" + c.id + "'\">" +
            "<td><input type='checkbox' onclick='event.stopPropagation()' /></td>" +
            "<td><div class='row gap-2'><div class='avatar' style='width:24px;height:24px;font-size:9px;'>" + initials + "</div><strong>" + c.firstName + " " + c.lastName + "</strong></div></td>" +
            "<td>" + title + "</td>" +
            "<td>" + company + "</td>" +
            "<td>" + date + "</td>" +
            "<td>—</td>" +
            "<td><span class='badge muted'>" + source + "</span></td>" +
            "</tr>";
        }).join("");

      } catch (err) {
        console.error("Failed to load contacts:", err);
        document.getElementById("contacts-tbody").innerHTML = "<tr><td colspan='7' style='text-align:center; padding:40px; color:var(--ink-50);'>Failed to load contacts. Please refresh.</td></tr>";
      }
    }

    document.getElementById("new-contact-btn").addEventListener("click", function() {
      document.getElementById("new-contact-modal").style.display = "flex";
    });

    document.getElementById("nc-save-btn").addEventListener("click", async function() {
      var firstName = document.getElementById("nc-firstname").value.trim();
      var lastName = document.getElementById("nc-lastname").value.trim();
      var email = document.getElementById("nc-email").value.trim();
      var title = document.getElementById("nc-title").value.trim();
      var phone = document.getElementById("nc-phone").value.trim();
      var location = document.getElementById("nc-location").value.trim();
      var errEl = document.getElementById("new-contact-error");
      var btn = document.getElementById("nc-save-btn");

      if (!firstName || !lastName) {
        errEl.textContent = "First name and last name are required.";
        errEl.style.display = "block";
        return;
      }

      btn.textContent = "Saving...";
      btn.disabled = true;
      errEl.style.display = "none";

      try {
        var payload = { firstName: firstName, lastName: lastName };
        if (email) payload.email = email;
        if (title) payload.title = title;
        if (phone) payload.phone = phone;
        if (location) payload.location = location;

        await SS_API.Contacts.create(payload);
        document.getElementById("new-contact-modal").style.display = "none";
        ["nc-firstname","nc-lastname","nc-email","nc-title","nc-phone","nc-location"].forEach(function(id) {
          document.getElementById(id).value = "";
        });
        btn.textContent = "Save contact";
        btn.disabled = false;
        loadContacts();
      } catch (err) {
        errEl.textContent = err.message || "Failed to save contact.";
        errEl.style.display = "block";
        btn.textContent = "Save contact";
        btn.disabled = false;
      }
    });

    loadContacts();
  </script>
  <script src="assets/chrome.js"></script>
</body>
</html>
