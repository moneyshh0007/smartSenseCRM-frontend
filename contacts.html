<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contacts · SmartSense CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="contacts" class="">
  <div class="app">
    <div data-sidebar></div>
    <main class="main">
      <div class="topbar">
        <div class="breadcrumb"><a href="contacts.html">Records</a><span class="sep">/</span><a href="contacts.html" class="current">Contacts</a></div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications">○</button>
          <button class="icon-btn" title="Help">?</button>
        </div>
      </div>
      <div class="content">

  <div class="page-header">
    <div>
      <div class="eyebrow">M1 · F1.1 · F1.2 · F1.4 · F1.6</div>
      <h1 class="page-title mt-2">Contacts</h1>
      <div class="page-sub" id="contacts-sub">Loading contacts...</div>
    </div>
    <div class="row gap-2">
      <button class="btn" onclick="window.location.href='import-upload.html'">Import CSV</button>
      <button class="btn" onclick="window.location.href='linkedin-capture?from=contacts'">LinkedIn Capture</button>
      <button class="btn primary" id="new-contact-btn">+ New contact</button>
    </div>
  </div>

  <div class="kpi-grid mb-5">
    <div class="kpi">
      <div class="kpi-label">Total contacts</div>
      <div class="kpi-value">1,847</div>
      <div class="kpi-delta">All records</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">New this week</div>
      <div class="kpi-value">23</div>
      <div class="kpi-delta up">Since last Monday</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">With email</div>
      <div class="kpi-value">1,612</div>
      <div class="kpi-delta">87% of records</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Linked to company</div>
      <div class="kpi-value">1,604</div>
      <div class="kpi-delta">87% of records</div>
    </div>
  </div>

  <div class="row mb-4 gap-3" style="flex-wrap:wrap;">
    <div class="row gap-2" style="align-items:center;flex-wrap:wrap;">

      <!-- Add filter button + dropdown -->
      <div style="position:relative;">
        <button class="btn sm" id="filter-btn" onclick="toggleFilterDropdown(event)">+ Add filter</button>
        <div id="filter-dropdown" style="
          display:none; position:absolute; top:calc(100% + 6px); left:0;
          background:var(--paper); border:var(--rule-strong); border-radius:var(--radius);
          box-shadow:var(--shadow-pop); width:320px; z-index:100; padding:14px;
        ">
          <div style="font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-50);margin-bottom:10px;">Filter contacts by</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div>
                <label style="font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:4px;">Field</label>
                <select id="ff-field" style="width:100%;border:var(--rule);border-radius:var(--radius);padding:6px 8px;font-size:12px;font-family:var(--body);" onchange="updateFilterOperators()">
                  <option value="company">Company</option>
                  <option value="title">Title</option>
                  <option value="source">Source</option>
                  <option value="created">Created date</option>
                  <option value="email">Has email</option>
                  <option value="linked">Linked to company</option>
                </select>
              </div>
              <div>
                <label style="font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:4px;">Condition</label>
                <select id="ff-op" style="width:100%;border:var(--rule);border-radius:var(--radius);padding:6px 8px;font-size:12px;font-family:var(--body);">
                  <option>contains</option>
                  <option>equals</option>
                  <option>does not contain</option>
                </select>
              </div>
            </div>
            <div>
              <label style="font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:4px;">Value</label>
              <input id="ff-value" type="text" placeholder="Enter value…" style="width:100%;border:var(--rule);border-radius:var(--radius);padding:6px 8px;font-size:12px;font-family:var(--body);box-sizing:border-box;" onkeydown="if(event.key==='Enter')applyFilter()" />
              <select id="ff-value-select" style="display:none;width:100%;border:var(--rule);border-radius:var(--radius);padding:6px 8px;font-size:12px;font-family:var(--body);">
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
              <select id="ff-source-select" style="display:none;width:100%;border:var(--rule);border-radius:var(--radius);padding:6px 8px;font-size:12px;font-family:var(--body);">
                <option value="manual">Manual</option>
                <option value="gmail_sync">Gmail Sync</option>
                <option value="linkedin">LinkedIn</option>
                <option value="calendar">Calendar</option>
                <option value="enrichment">Enrichment</option>
                <option value="csv_import">CSV Import</option>
              </select>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px;">
              <button class="btn sm" onclick="closeFilterDropdown()">Cancel</button>
              <button class="btn sm primary" onclick="applyFilter()">Apply filter</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Active filter chips -->
      <div id="active-filters" class="row gap-2" style="flex-wrap:wrap;"></div>

      <button class="btn sm" id="delete-contacts-btn" style="display:none;"
        onclick="deleteSelectedContacts()">Delete contact</button>
    </div>
    <div style="margin-left: auto;" class="row gap-2">
      <span class="text-mono text-muted" style="font-size: 11px;" id="contacts-count"></span>
    </div>
  </div>

  <div style="max-height: 520px; overflow-y: auto; border: var(--rule); border-radius: var(--radius);">
    <table class="table" style="border: none; border-radius: 0;">
      <thead>
        <tr>
          <th style="width: 24px; position: sticky; top: 0; z-index: 1;"><input type="checkbox" id="select-all-contacts" onchange="document.querySelectorAll('#contacts-tbody input[type=checkbox]').forEach(function(cb){ cb.checked = this.checked; }.bind(this)); updateDeleteBtn();" /></th>
          <th style="position: sticky; top: 0; z-index: 1;">Name</th>
          <th style="position: sticky; top: 0; z-index: 1;">Title</th>
          <th style="position: sticky; top: 0; z-index: 1;">Company</th>
          <th style="position: sticky; top: 0; z-index: 1;">Created</th>
          <th style="position: sticky; top: 0; z-index: 1;">Owner</th>
          <th style="position: sticky; top: 0; z-index: 1;">Source</th>
        </tr>
      </thead>
      <tbody id="contacts-tbody">
        <tr>
          <td colspan="7" style="text-align:center; padding:40px; color:var(--ink-50);">
            Loading...
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="row between mt-5">
    <div class="text-mono text-muted" style="font-size: 11px;" id="contacts-footer"></div>
  </div>


      </div>
    </main>
  </div>

  <script src="assets/api.js"></script>
  <script>
    if (!SS_API.Auth.isLoggedIn()) window.location.href = "index.html";

    // ── Filter state ─────────────────────────────────────────────
    var _allContacts = [];
    var _activeFilters = [];

    var FIELD_LABELS = { company:"Company", title:"Title", source:"Source", created:"Created", email:"Has email", linked:"Linked to company" };
    var OPS_FOR_FIELD = {
      company: ["contains","equals","does not contain"],
      title:   ["contains","equals","does not contain"],
      source:  ["is","is not"],
      created: ["is before","is after"],
      email:   ["is"],
      linked:  ["is"],
    };

    function toggleFilterDropdown(e) {
      e.stopPropagation();
      var dd = document.getElementById("filter-dropdown");
      dd.style.display = dd.style.display === "none" ? "block" : "none";
      if (dd.style.display === "block") {
        updateFilterOperators();
        document.getElementById("ff-value").focus();
      }
    }
    function closeFilterDropdown() {
      document.getElementById("filter-dropdown").style.display = "none";
    }
    document.addEventListener("click", function(e) {
      var dd = document.getElementById("filter-dropdown");
      var btn = document.getElementById("filter-btn");
      if (dd && !dd.contains(e.target) && e.target !== btn) dd.style.display = "none";
    });

    function updateFilterOperators() {
      var field = document.getElementById("ff-field").value;
      var opSel = document.getElementById("ff-op");
      var ops   = OPS_FOR_FIELD[field] || ["contains","equals"];
      opSel.innerHTML = ops.map(function(o) { return "<option>" + o + "</option>"; }).join("");

      // Show/hide value inputs
      var txtInput  = document.getElementById("ff-value");
      var boolSel   = document.getElementById("ff-value-select");
      var srcSel    = document.getElementById("ff-source-select");
      txtInput.style.display  = "none";
      boolSel.style.display   = "none";
      srcSel.style.display    = "none";

      if (field === "source") {
        srcSel.style.display = "block";
      } else if (field === "email" || field === "linked") {
        boolSel.style.display = "block";
      } else if (field === "created") {
        txtInput.style.display = "block";
        txtInput.type = "date";
        txtInput.placeholder = "";
      } else {
        txtInput.style.display = "block";
        txtInput.type = "text";
        txtInput.placeholder = "Enter value…";
      }
    }

    function applyFilter() {
      var field = document.getElementById("ff-field").value;
      var op    = document.getElementById("ff-op").value;
      var txtInput = document.getElementById("ff-value");
      var boolSel  = document.getElementById("ff-value-select");
      var srcSel   = document.getElementById("ff-source-select");
      var value;
      if (field === "source")                    value = srcSel.value;
      else if (field === "email" || field === "linked") value = boolSel.value;
      else                                        value = txtInput.value.trim();

      if (!value) { txtInput.focus(); return; }

      _activeFilters.push({ field: field, op: op, value: value });
      renderFilterChips();
      renderContacts(filteredContacts());
      closeFilterDropdown();
      txtInput.value = "";
    }

    function removeFilter(idx) {
      _activeFilters.splice(idx, 1);
      renderFilterChips();
      renderContacts(filteredContacts());
    }

    function renderFilterChips() {
      var container = document.getElementById("active-filters");
      container.innerHTML = _activeFilters.map(function(f, i) {
        return "<span class='chip' style='background:var(--ink);color:var(--paper);'>" +
          FIELD_LABELS[f.field] + " " + f.op + " <em>" + f.value + "</em> " +
          "<span class='chip-x' onclick='removeFilter(" + i + ")' style='cursor:pointer;color:rgba(255,255,255,.7);'>×</span>" +
          "</span>";
      }).join("");
      // Update filter button label
      var btn = document.getElementById("filter-btn");
      btn.textContent = _activeFilters.length > 0 ? "+ Add filter (" + _activeFilters.length + ")" : "+ Add filter";
    }

    function filteredContacts() {
      if (_activeFilters.length === 0) return _allContacts;
      return _allContacts.filter(function(c) {
        return _activeFilters.every(function(f) {
          var val = f.value.toLowerCase();
          var op  = f.op;
          switch(f.field) {
            case "company": {
              var co = (c.company ? c.company.name : "").toLowerCase();
              if (op === "contains")          return co.includes(val);
              if (op === "equals")            return co === val;
              if (op === "does not contain")  return !co.includes(val);
              return true;
            }
            case "title": {
              var ti = (c.title || "").toLowerCase();
              if (op === "contains")          return ti.includes(val);
              if (op === "equals")            return ti === val;
              if (op === "does not contain")  return !ti.includes(val);
              return true;
            }
            case "source": {
              return (c.source || "manual").toLowerCase() === val;
            }
            case "created": {
              var cd = new Date(c.createdAt);
              var fv = new Date(f.value);
              if (op === "is before") return cd < fv;
              if (op === "is after")  return cd > fv;
              return true;
            }
            case "email": {
              var hasEmail = !!(c.email);
              return val === "yes" ? hasEmail : !hasEmail;
            }
            case "linked": {
              var hasCompany = !!(c.company);
              return val === "yes" ? hasCompany : !hasCompany;
            }
            default: return true;
          }
        });
      });
    }

    function renderContacts(contacts) {
      var tbody  = document.getElementById("contacts-tbody");
      var count  = document.getElementById("contacts-count");
      var footer = document.getElementById("contacts-footer");
      count.textContent  = contacts.length + " RESULTS";
      footer.textContent = "SHOWING " + contacts.length + " CONTACTS";
      if (contacts.length === 0) {
        tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;padding:40px;color:var(--ink-50);'>No contacts match the current filters.</td></tr>";
        return;
      }
      tbody.innerHTML = contacts.map(function(c) {
        var initials = c.firstName[0] + c.lastName[0];
        var company  = c.company ? c.company.name : "—";
        var title    = c.title || "—";
        var source   = c.source || "manual";
        var date     = new Date(c.createdAt).toLocaleDateString();
        return "<tr style='cursor:pointer;' onclick=\"window.location.href='contact-detail?id=" + c.id + "'\">" +
          "<td><input type='checkbox' data-id='" + c.id + "' onclick='event.stopPropagation()' onchange='updateDeleteBtn()' /></td>" +
          "<td><div class='row gap-2'><div class='avatar' style='width:24px;height:24px;font-size:9px;'>" + initials + "</div><strong>" + c.firstName + " " + c.lastName + "</strong></div></td>" +
          "<td>" + title + "</td>" +
          "<td>" + company + "</td>" +
          "<td>" + date + "</td>" +
          "<td>—</td>" +
          "<td><span class='badge muted'>" + source + "</span></td>" +
          "</tr>";
      }).join("");
    }

    async function loadContacts() {
      try {
        const data = await SS_API.Contacts.list();
        const sub = document.getElementById("contacts-sub");
        sub.textContent = data.total + " Contacts · Live from database";
        _allContacts = data.contacts || [];
        renderContacts(filteredContacts());
      } catch (err) {
        console.error("Failed to load contacts:", err);
        document.getElementById("contacts-tbody").innerHTML =
          "<tr><td colspan='7' style='text-align:center;padding:40px;color:var(--ink-50);'>Failed to load contacts. Please refresh.</td></tr>";
      }
    }

    function updateDeleteBtn() {
      var checked = document.querySelectorAll('#contacts-tbody input[type=checkbox]:checked');
      var btn = document.getElementById('delete-contacts-btn');
      if (!btn) return;
      if (checked.length > 0) {
        btn.style.display = '';
        btn.textContent = 'Delete contact' + (checked.length > 1 ? 's (' + checked.length + ')' : '');
      } else {
        btn.style.display = 'none';
      }
    }

    async function deleteSelectedContacts() {
      var checked = Array.from(document.querySelectorAll('#contacts-tbody input[type=checkbox]:checked'));
      var ids = checked.map(function(cb) { return cb.getAttribute('data-id'); }).filter(Boolean);
      if (!ids.length) return;
      var label = ids.length === 1 ? '1 contact' : ids.length + ' contacts';
      if (!confirm('Delete ' + label + '? This cannot be undone.')) return;

      var btn = document.getElementById('delete-contacts-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Deleting…'; }

      var results = await Promise.allSettled(ids.map(function(id) {
        return SS_API.Contacts.delete(id);
      }));

      var failed = results.filter(function(r) { return r.status === 'rejected'; }).length;
      if (btn) { btn.disabled = false; }

      // Uncheck all and reload
      var allCb = document.getElementById('select-all-contacts');
      if (allCb) { allCb.checked = false; allCb.indeterminate = false; }
      await loadContacts();
      updateDeleteBtn();

      if (failed > 0) alert(failed + ' contact(s) could not be deleted.');
    }

    window.SS_loadContacts = loadContacts;
    loadContacts();
  </script>
  <script src="assets/chrome.js"></script>
</body>
</html>
