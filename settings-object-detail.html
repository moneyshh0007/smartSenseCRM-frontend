<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Object · Data Model · SmartSense CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="settings" class="">
  <div class="app">
    <div data-sidebar></div>
    <main class="main">
      <div class="topbar">
        <div class="breadcrumb">
          <a href="settings.html">Workspace Admin</a><span class="sep">/</span>
          <a href="settings.html">Settings</a><span class="sep">/</span>
          <a href="settings-data-model.html">Data Model</a><span class="sep">/</span>
          <span class="current" id="breadcrumb-object">Loading…</span>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications">○</button>
          
        </div>
      </div>
      <div class="content">

  <div class="page-header">
    <div>
      <div class="eyebrow">M1 · F1.1 · F2.3 · Object Settings</div>
      <h1 class="page-title mt-2" id="object-heading">Loading…</h1>
      <div class="page-sub" id="object-sub"></div>
    </div>
    <div class="row gap-2">
      <button class="btn" onclick="window.location.href='settings-data-model'">← Data Model</button>
      <button class="btn" id="delete-object-btn" onclick="deleteObject()">Delete object</button>
    </div>
  </div>

  <!-- Field table -->
  <div class="card mb-5" style="padding:0; overflow:hidden;">
    <div style="padding:var(--space-5) var(--space-5) 0; display:flex; align-items:center; justify-content:space-between;">
      <div class="card-title" id="fields-heading">Fields</div>
      <span class="text-mono text-muted" style="font-size:11px;" id="fields-count"></span>
    </div>
    <table class="table mt-3">
      <thead>
        <tr>
          <th style="width:24px;"></th>
          <th>Field name</th>
          <th>Type</th>
          <th>Required</th>
          <th>Stage gate</th>
          <th>API key</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="fields-tbody">
        <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--ink-50);">Loading fields…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Footer -->
  <div class="row gap-2 mt-5 between">
    <div class="text-muted" style="font-size:12px;" id="rebuild-note">
      Materialised view rebuild takes ~30 sec. No read downtime.
    </div>
    <div class="row gap-2">
      <button class="btn" onclick="discardChanges()">Discard changes</button>
      <button class="btn primary" onclick="publishSchema()">Publish schema</button>
    </div>
  </div>

      </div>
    </main>
  </div>

  <script src="assets/api.js"></script>
  <script>
    if (!SS_API.Auth.isLoggedIn()) window.location.href = "index.html";

    var objectName = new URLSearchParams(window.location.search).get("object") || "";
    if (!objectName) { window.location.href = "settings-data-model.html"; throw new Error("No object"); }

    // ── Object field definitions ─────────────────────────────────
    var OBJECTS = {
      "Person": {
        sub: "Default object · 1,847 records · Schema v3",
        rebuildNote: "Materialised view rebuild takes ~45 sec for 1,847 persons.",
        fields: [
          { name:"First name",  type:"Text",            required:"✓ Always",    gate:"—",         key:"first_name" },
          { name:"Last name",   type:"Text",            required:"✓ Always",    gate:"—",         key:"last_name" },
          { name:"Email",       type:"Email",           required:"—",           gate:"—",         key:"email" },
          { name:"Phone",       type:"Phone",           required:"—",           gate:"—",         key:"phone" },
          { name:"Title",       type:"Text",            required:"—",           gate:"—",         key:"title" },
          { name:"Company",     type:"Relation (Company)", required:"—",        gate:"—",         key:"company_id" },
          { name:"Location",    type:"Text",            required:"—",           gate:"—",         key:"location" },
          { name:"LinkedIn",    type:"URL",             required:"—",           gate:"—",         key:"linkedin_url" },
          { name:"Source",      type:"Single-select",   required:"—",           gate:"—",         key:"source" },
          { name:"Owner",       type:"Relation (User)", required:"✓ Always",    gate:"—",         key:"owner_id" },
          { name:"Tags",        type:"Multi-select",    required:"—",           gate:"—",         key:"tags" },
          { name:"Created at",  type:"Timestamp",       required:"Auto",        gate:"—",         key:"created_at", readonly:true },
        ]
      },
      "Company": {
        sub: "Default object · 412 records · Schema v3",
        rebuildNote: "Materialised view rebuild takes ~15 sec for 412 companies.",
        fields: [
          { name:"Name",        type:"Text",            required:"✓ Always",    gate:"—",         key:"name" },
          { name:"Domain",      type:"URL",             required:"—",           gate:"—",         key:"domain" },
          { name:"Industry",    type:"Single-select",   required:"—",           gate:"—",         key:"industry" },
          { name:"Size",        type:"Number",          required:"—",           gate:"—",         key:"size" },
          { name:"HQ",          type:"Text",            required:"—",           gate:"—",         key:"hq" },
          { name:"Owner",       type:"Relation (User)", required:"✓ Always",    gate:"—",         key:"owner_id" },
          { name:"Tags",        type:"Multi-select",    required:"—",           gate:"—",         key:"tags" },
          { name:"Description", type:"Long text",       required:"—",           gate:"—",         key:"description" },
          { name:"Created at",  type:"Timestamp",       required:"Auto",        gate:"—",         key:"created_at", readonly:true },
        ]
      },
      "Deal": {
        sub: "Default object · 60 records · Schema v3",
        rebuildNote: "Materialised view rebuild takes ~30 sec for 60 deals.",
        fields: [
          { name:"Name",              type:"Text",                     required:"✓ Always",        gate:"—",          key:"name" },
          { name:"Amount",            type:"Currency",                 required:"✓ Always",        gate:"—",          key:"amount" },
          { name:"Stage",             type:"Single-select (Pipeline)", required:"✓ Always",        gate:"—",          key:"stage" },
          { name:"Competitor",        type:"Single-select",            required:"✓ Before Proposal",gate:"Proposal+", key:"competitor" },
          { name:"Source",            type:"Single-select",            required:"—",               gate:"—",          key:"source" },
          { name:"ACV tier",          type:"Single-select",            required:"—",               gate:"—",          key:"acv_tier" },
          { name:"Probability",       type:"Number (0-100)",           required:"—",               gate:"—",          key:"probability" },
          { name:"Close date",        type:"Date",                     required:"✓ Before Negotiation",gate:"Neg+",   key:"close_date" },
          { name:"Buying committee",  type:"Multi-select (People)",    required:"—",               gate:"—",          key:"buying_committee" },
          { name:"Forecast category", type:"Single-select",            required:"—",               gate:"—",          key:"forecast_category" },
          { name:"Owner",             type:"Relation (User)",          required:"✓ Always",        gate:"—",          key:"owner_id" },
          { name:"Pipeline",          type:"Relation (Pipeline)",      required:"✓ Always",        gate:"—",          key:"pipeline_id" },
          { name:"Created at",        type:"Timestamp",                required:"Auto",            gate:"—",          key:"created_at", readonly:true },
          { name:"Acct Type",         type:"Single-select",            required:"—",               gate:"—",          key:"acct_type", deprecated:true },
        ]
      },
      "Task": {
        sub: "Default object · 142 records · Schema v3",
        rebuildNote: "Materialised view rebuild takes ~10 sec for 142 tasks.",
        fields: [
          { name:"Title",       type:"Text",            required:"✓ Always",    gate:"—",         key:"title" },
          { name:"Description", type:"Long text",       required:"—",           gate:"—",         key:"description" },
          { name:"Due at",      type:"Datetime",        required:"—",           gate:"—",         key:"due_at" },
          { name:"Priority",    type:"Single-select",   required:"—",           gate:"—",         key:"priority" },
          { name:"Completed",   type:"Boolean",         required:"—",           gate:"—",         key:"completed" },
          { name:"Tags",        type:"Multi-select",    required:"—",           gate:"—",         key:"tags" },
          { name:"Owner",       type:"Relation (User)", required:"✓ Always",    gate:"—",         key:"owner_id" },
          { name:"Contact",     type:"Relation (Person)","required":"—",        gate:"—",         key:"contact_id" },
          { name:"Deal",        type:"Relation (Deal)", required:"—",           gate:"—",         key:"deal_id" },
          { name:"Created at",  type:"Timestamp",       required:"Auto",        gate:"—",         key:"created_at", readonly:true },
        ]
      },
      "Note": {
        sub: "Default object · 287 records · Schema v3",
        rebuildNote: "Materialised view rebuild takes ~10 sec for 287 notes.",
        fields: [
          { name:"Body",        type:"Rich text",       required:"✓ Always",    gate:"—",         key:"body" },
          { name:"Author",      type:"Relation (User)", required:"✓ Always",    gate:"—",         key:"author_id" },
          { name:"Contact",     type:"Relation (Person)","required":"—",        gate:"—",         key:"contact_id" },
          { name:"Company",     type:"Relation (Company)","required":"—",       gate:"—",         key:"company_id" },
          { name:"Deal",        type:"Relation (Deal)", required:"—",           gate:"—",         key:"deal_id" },
          { name:"Created at",  type:"Timestamp",       required:"Auto",        gate:"—",         key:"created_at", readonly:true },
        ]
      }
    };

    var data = OBJECTS[objectName] || {
      sub: "Custom object",
      rebuildNote: "Materialised view rebuild in progress.",
      fields: []
    };

    // ── Populate page ────────────────────────────────────────────
    document.getElementById("page-title").textContent       = objectName + " · Data Model · SmartSense CRM";
    document.getElementById("breadcrumb-object").textContent = objectName;
    document.getElementById("object-heading").textContent   = objectName + " — Fields";
    document.getElementById("object-sub").textContent       = data.sub;
    document.getElementById("rebuild-note").textContent     = data.rebuildNote;
    document.getElementById("fields-count").textContent     = data.fields.length + " FIELDS";
    document.getElementById("fields-heading").textContent   = objectName + " fields";

    var tbody = document.getElementById("fields-tbody");
    tbody.innerHTML = data.fields.map(function(f, i) {
      var rowStyle = f.deprecated ? " style='opacity:0.55;background:var(--ink-03);'" : "";
      var nameHtml = "<strong>" + f.name + "</strong>" +
        (f.deprecated ? " <span class='badge warn' style='font-size:9px;vertical-align:middle;'>DEPRECATED</span>" : "");
      var keyHtml  = f.deprecated
        ? "<span class='text-mono' style='font-size:11px;text-decoration:line-through;color:var(--ink-30);'>" + f.key + "</span>"
        : "<span class='text-mono' style='font-size:11px;'>" + f.key + "</span>";
      var actionHtml = f.readonly || f.deprecated
        ? "<span class='text-muted' style='font-size:11px;'>System</span>"
        : "<button class='btn sm' onclick='openEditFieldPanel(" + i + ")'>Edit</button>";
      var gateHtml = f.gate !== "—"
        ? "<span class='badge'>" + f.gate + "</span>"
        : "—";
      return "<tr" + rowStyle + ">" +
        "<td>" + (f.readonly || f.deprecated ? "—" : "≡") + "</td>" +
        "<td>" + nameHtml + "</td>" +
        "<td>" + f.type + "</td>" +
        "<td>" + f.required + "</td>" +
        "<td>" + gateHtml + "</td>" +
        "<td>" + keyHtml + "</td>" +
        "<td>" + actionHtml + "</td>" +
        "</tr>";
    }).join("") +
    "<tr style='background:var(--ink-03);'><td>—</td><td colspan='6'><button class='btn sm primary' onclick='openAddFieldPanel()'>+ Add field</button></td></tr>";

    // ── Delete object ────────────────────────────────────────────
    var SYSTEM_OBJECTS = ["Person", "Company", "Deal", "Task", "Note"];

    function deleteObject() {
      if (SYSTEM_OBJECTS.indexOf(objectName) !== -1) {
        // System objects cannot be deleted
        if (window.SS_toast) {
          window.SS_toast(objectName + " cannot be deleted", {
            sub: "System objects are part of the core data model and cannot be removed."
          });
        } else {
          alert(objectName + " is a system object and cannot be deleted.");
        }
        return;
      }

      // Custom object — confirm then delete
      if (!confirm('Delete "' + objectName + '"?\n\nAll field definitions for this object will be permanently removed. This cannot be undone.')) return;

      var btn = document.getElementById("delete-object-btn");
      if (btn) { btn.disabled = true; btn.textContent = "Deleting…"; }

      // Remove from localStorage (keyed by id matching the name)
      var STORAGE_KEY = "ss_custom_objects_v1";
      var saved = [];
      try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch(e) {}
      saved = saved.filter(function(o) { return o.name !== objectName; });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));

      if (window.SS_toast) window.SS_toast("Object deleted", { sub: objectName + " has been removed from the data model." });
      setTimeout(function() { window.location.href = "settings-data-model"; }, 800);
    }

    function publishSchema() {
      if (window.SS_toast) window.SS_toast(objectName + " schema published", { sub: "Schema v4 is now live. Rebuild queued." });
      else alert(objectName + " schema published.");
    }
    function discardChanges() {
      window.location.reload();
    }
  </script>
  <!-- ── Field edit / add slide panel ───────────────────────── -->
  <div id="fp-backdrop" onclick="closeFieldPanel()" style="
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:199;"></div>

  <div id="fp-panel" style="
    position:fixed;top:0;right:-480px;width:440px;height:100vh;
    background:var(--paper);border-left:1px solid var(--ink);
    box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:200;
    display:flex;flex-direction:column;
    transition:right 220ms cubic-bezier(.4,0,.2,1);">

    <div style="padding:18px 20px;border-bottom:var(--rule);background:var(--paper-warm);display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div id="fp-eyebrow" style="font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-50);"></div>
        <h3 id="fp-title" style="font-size:16px;font-weight:600;margin-top:4px;"></h3>
      </div>
      <button onclick="closeFieldPanel()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-50);line-height:1;">×</button>
    </div>

    <div style="flex:1;overflow-y:auto;padding:20px;">

      <div style="margin-bottom:14px;">
        <label style="font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:4px;">Field name *</label>
        <input id="fp-name" type="text" placeholder="e.g. Close date" oninput="fpUpdateApiKey()"
          style="width:100%;border:var(--rule);border-radius:var(--radius);padding:7px 10px;font-size:13px;box-sizing:border-box;" />
      </div>

      <div style="margin-bottom:14px;">
        <label style="font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:4px;">API key</label>
        <div id="fp-apikey" style="font-family:var(--mono);font-size:12px;color:var(--ink-50);padding:7px 10px;background:var(--paper-warm);border:var(--rule);border-radius:var(--radius);">field_name</div>
      </div>

      <div style="margin-bottom:14px;">
        <label style="font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:4px;">Type</label>
        <select id="fp-type" style="width:100%;border:var(--rule);border-radius:var(--radius);padding:7px 10px;font-size:13px;box-sizing:border-box;">
          <option>Text</option>
          <option>Long text</option>
          <option>Rich text</option>
          <option>Email</option>
          <option>Phone</option>
          <option>URL</option>
          <option>Number</option>
          <option>Number (0-100)</option>
          <option>Currency</option>
          <option>Date</option>
          <option>Datetime</option>
          <option>Boolean</option>
          <option>Single-select</option>
          <option>Multi-select</option>
          <option>Relation (Person)</option>
          <option>Relation (Company)</option>
          <option>Relation (Deal)</option>
          <option>Relation (User)</option>
          <option>Relation (Pipeline)</option>
        </select>
      </div>

      <div style="margin-bottom:14px;">
        <label style="font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:4px;">Required</label>
        <select id="fp-required" onchange="fpToggleGate()" style="width:100%;border:var(--rule);border-radius:var(--radius);padding:7px 10px;font-size:13px;box-sizing:border-box;">
          <option value="—">— (optional)</option>
          <option value="✓ Always">✓ Always</option>
          <option value="before">✓ Before stage…</option>
        </select>
      </div>

      <div id="fp-gate-row" style="margin-bottom:14px;display:none;">
        <label style="font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:4px;">Before stage (gate)</label>
        <input id="fp-gate" type="text" placeholder="e.g. Proposal"
          style="width:100%;border:var(--rule);border-radius:var(--radius);padding:7px 10px;font-size:13px;box-sizing:border-box;" />
        <div style="font-size:11px;color:var(--ink-50);margin-top:4px;">Field becomes required before this pipeline stage is reached.</div>
      </div>

    </div>

    <div style="padding:14px 20px;border-top:var(--rule);background:var(--paper-warm);display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn" onclick="closeFieldPanel()">Cancel</button>
      <button class="btn primary" onclick="saveField()">Save field</button>
    </div>
  </div>

  <script>
    var fpEditIndex = -1;

    function rerenderFields() {
      var tbody = document.getElementById("fields-tbody");
      tbody.innerHTML = data.fields.map(function(f, i) {
        var rowStyle = f.deprecated ? " style='opacity:0.55;background:var(--ink-03);'" : "";
        var nameHtml = "<strong>" + f.name + "</strong>" +
          (f.deprecated ? " <span class='badge warn' style='font-size:9px;vertical-align:middle;'>DEPRECATED</span>" : "");
        var keyHtml  = f.deprecated
          ? "<span class='text-mono' style='font-size:11px;text-decoration:line-through;color:var(--ink-30);'>" + f.key + "</span>"
          : "<span class='text-mono' style='font-size:11px;'>" + f.key + "</span>";
        var actionHtml = f.readonly || f.deprecated
          ? "<span class='text-muted' style='font-size:11px;'>System</span>"
          : "<button class='btn sm' onclick='openEditFieldPanel(" + i + ")'>Edit</button>";
        var gateHtml = f.gate !== "—"
          ? "<span class='badge'>" + f.gate + "</span>"
          : "—";
        return "<tr" + rowStyle + ">" +
          "<td>" + (f.readonly || f.deprecated ? "—" : "≡") + "</td>" +
          "<td>" + nameHtml + "</td>" +
          "<td>" + f.type + "</td>" +
          "<td>" + f.required + "</td>" +
          "<td>" + gateHtml + "</td>" +
          "<td>" + keyHtml + "</td>" +
          "<td>" + actionHtml + "</td>" +
          "</tr>";
      }).join("") +
      "<tr style='background:var(--ink-03);'><td>—</td><td colspan='6'><button class='btn sm primary' onclick='openAddFieldPanel()'>+ Add field</button></td></tr>";
      document.getElementById("fields-count").textContent = data.fields.length + " FIELDS";
    }

    function openEditFieldPanel(index) {
      fpEditIndex = index;
      var f = data.fields[index];
      document.getElementById("fp-eyebrow").textContent = objectName + " · Edit Field";
      document.getElementById("fp-title").textContent   = "Edit “" + f.name + "”";
      document.getElementById("fp-name").value          = f.name;
      document.getElementById("fp-apikey").textContent  = f.key;

      var sel = document.getElementById("fp-type");
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === f.type) { sel.selectedIndex = i; break; }
      }

      var reqSel = document.getElementById("fp-required");
      if (f.required === "✓ Always") {
        reqSel.value = "✓ Always";
      } else if (f.required !== "—" && f.required.indexOf("✓ Before") === 0) {
        reqSel.value = "before";
        document.getElementById("fp-gate").value = f.required.replace(/^✓ Before /, "");
      } else {
        reqSel.value = "—";
      }
      fpToggleGate();

      document.getElementById("fp-backdrop").style.display = "block";
      document.getElementById("fp-panel").style.right = "0";
      setTimeout(function() { document.getElementById("fp-name").focus(); }, 280);
    }

    function openAddFieldPanel() {
      fpEditIndex = -1;
      document.getElementById("fp-eyebrow").textContent  = objectName + " · Add Field";
      document.getElementById("fp-title").textContent    = "Add field";
      document.getElementById("fp-name").value           = "";
      document.getElementById("fp-apikey").textContent   = "field_name";
      document.getElementById("fp-type").selectedIndex   = 0;
      document.getElementById("fp-required").value       = "—";
      document.getElementById("fp-gate").value           = "";
      fpToggleGate();

      document.getElementById("fp-backdrop").style.display = "block";
      document.getElementById("fp-panel").style.right = "0";
      setTimeout(function() { document.getElementById("fp-name").focus(); }, 280);
    }

    function closeFieldPanel() {
      document.getElementById("fp-backdrop").style.display = "none";
      document.getElementById("fp-panel").style.right = "-480px";
    }

    function fpUpdateApiKey() {
      if (fpEditIndex !== -1) return;
      var name = document.getElementById("fp-name").value.trim();
      var key  = name.toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9_]/g, "");
      document.getElementById("fp-apikey").textContent = key || "field_name";
    }

    function fpToggleGate() {
      var show = document.getElementById("fp-required").value === "before";
      document.getElementById("fp-gate-row").style.display = show ? "block" : "none";
    }

    function saveField() {
      var name = document.getElementById("fp-name").value.trim();
      if (!name) {
        if (window.SS_toast) window.SS_toast("Field name required", { sub: "Please enter a name for this field." });
        else alert("Field name is required.");
        document.getElementById("fp-name").focus();
        return;
      }

      var type   = document.getElementById("fp-type").value;
      var reqVal = document.getElementById("fp-required").value;
      var required, gate;

      if (reqVal === "before") {
        var stage = document.getElementById("fp-gate").value.trim();
        required  = stage ? "✓ Before " + stage : "—";
        gate      = stage ? stage + "+" : "—";
      } else {
        required = reqVal;
        gate     = "—";
      }

      var apiKey = document.getElementById("fp-apikey").textContent.trim() ||
                   name.toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9_]/g, "");

      if (fpEditIndex === -1) {
        var insertAt = data.fields.length - 1;
        data.fields.splice(insertAt, 0, { name: name, type: type, required: required, gate: gate, key: apiKey });
        if (window.SS_toast) window.SS_toast("Field added", { sub: "“" + name + "” added to " + objectName + "." });
      } else {
        var f      = data.fields[fpEditIndex];
        f.name     = name;
        f.type     = type;
        f.required = required;
        f.gate     = gate;
        if (window.SS_toast) window.SS_toast("Field updated", { sub: "“" + name + "” has been updated." });
      }

      rerenderFields();
      closeFieldPanel();
    }
  </script>

  <script src="assets/chrome.js"></script>
</body>
</html>
