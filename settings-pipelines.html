<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pipelines · SmartSense CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .pipeline-card { transition: border-color 0.15s; }
    .pipeline-card:hover { border-color: var(--ink-30) !important; cursor: pointer; }
    .pipeline-card.is-active { border-color: var(--ink) !important; }
  </style>
</head>
<body data-page="settings" class="">
  <div class="app">
    <div data-sidebar></div>
    <main class="main">
      <div class="topbar">
        <div class="breadcrumb" id="pipelines-breadcrumb">
          <a href="settings.html">Workspace Admin</a><span class="sep">/</span>
          <a href="settings.html">Settings</a><span class="sep">/</span>
          <span class="current">Manage Pipelines</span>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications">○</button>
        </div>
      </div>
      <div class="content">

        <div class="page-header">
          <div>
            <div class="eyebrow">Settings · Pipelines</div>
            <h1 class="page-title mt-2">Pipelines</h1>
            <div class="page-sub" id="pipelines-sub">Loading…</div>
          </div>
          <div class="row gap-2">
            <button class="btn primary" onclick="if(window.SS_openSlide)window.SS_openSlide('new-pipeline')">+ New pipeline</button>
          </div>
        </div>

        <div id="pipelines-list"></div>

      </div>
    </main>
  </div>
  <script src="assets/api.js"></script>
  <script>if (!SS_API.Auth.isLoggedIn()) window.location.href = "index.html";</script>
  <script>
    (function() {
      var from = new URLSearchParams(window.location.search).get("from");
      var bc   = document.getElementById("pipelines-breadcrumb");
      if (!bc) return;
      if (from === "deals") {
        bc.innerHTML =
          '<a href="contacts.html">Records</a><span class="sep">/</span>' +
          '<a href="deals.html">Deals</a><span class="sep">/</span>' +
          '<span class="current">Manage Pipelines</span>';
      }
    })();

    var _allPipelines = [];
    var _pipeObserver = null;

    async function loadPipelines() {
      try {
        var data = await window.SS_API.Pipelines.list();
        _allPipelines = data.pipelines || [];
        renderPipelines();
      } catch(e) {
        document.getElementById("pipelines-list").innerHTML =
          '<div class="card" style="text-align:center;padding:32px;color:var(--ink-50);">Failed to load pipelines. Please refresh.</div>';
        document.getElementById("pipelines-sub").textContent = "Error loading data";
      }
    }

    function renderPipelines() {
      var list = document.getElementById("pipelines-list");
      var sub  = document.getElementById("pipelines-sub");
      var count = _allPipelines.length;
      sub.textContent = count + " pipeline" + (count !== 1 ? "s" : "") + " · Each with its own stages, probabilities, and role-scoped visibility";

      if (!count) {
        list.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--ink-50);">No pipelines yet · Click <strong>+ New pipeline</strong> to create the first one</div>';
        return;
      }

      list.innerHTML = _allPipelines.map(function(p) {
        var stages = Array.isArray(p.stages) ? p.stages : [];
        var stageNames = stages.map(function(s) { return s.name; }).join(" · ") || "—";
        var createdDate = p.createdAt
          ? new Date(p.createdAt).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })
          : "—";
        return [
          '<div class="card mb-5 pipeline-card" data-pipeline-id="' + p.id + '">',
          '  <div class="card-head">',
          '    <div>',
          '      <div class="card-title">' + p.name.replace(/</g, "&lt;") + '</div>',
          '      <div class="card-sub">' + stages.length + ' stage' + (stages.length !== 1 ? 's' : '') + ' · Visible to: All roles</div>',
          '    </div>',
          '    <div class="row gap-2">',
          '      ' + (p.isDefault ? '<span class="badge solid">DEFAULT</span>' : ''),
          '      <button class="btn sm" onclick="openPipelineSettings(\'' + p.id + '\')">Settings</button>',
          '    </div>',
          '  </div>',
          '  <div class="text-muted mt-3 row gap-3" style="font-size:12px;">',
          '    <span><strong>Stages:</strong> ' + stageNames + '</span>',
          '    <span><strong>Created:</strong> ' + createdDate + '</span>',
          '  </div>',
          '</div>',
        ].join("\n");
      }).join("\n");
    }

    function openPipelineSettings(id) {
      var p = _allPipelines.find(function(x) { return x.id === id; });
      if (!p || !window.SS_openSlide) return;

      document.querySelectorAll(".pipeline-card").forEach(function(c) { c.classList.remove("is-active"); });
      var card = document.querySelector('.pipeline-card[data-pipeline-id="' + id + '"]');
      if (card) card.classList.add("is-active");

      // Normalise stages from API format { name, probability, order }
      // to the format the pipeline-settings slide expects { name, prob, probability, deals, value, required }
      var stages = (p.stages || []).map(function(s) {
        return { name: s.name, prob: s.probability || 0, probability: s.probability || 0, deals: 0, value: "—", required: "—" };
      });

      window.SS_openSlide("pipeline-settings", {
        id: p.id,
        name: p.name,
        stages: stages,
        isDefault: p.isDefault,
        visibility: "All roles",
      });

      // Remove active highlight when slide closes
      if (!_pipeObserver) {
        var panel = document.querySelector(".slide-over");
        if (panel) {
          _pipeObserver = new MutationObserver(function() {
            if (!panel.classList.contains("open")) {
              document.querySelectorAll(".pipeline-card").forEach(function(c) { c.classList.remove("is-active"); });
            }
          });
          _pipeObserver.observe(panel, { attributes: true, attributeFilter: ["class"] });
        }
      }
    }

    // Called by the pipeline-settings slide "Make default" button
    window.makeDefaultPipeline = async function(id) {
      if (!id || !window.SS_API) return;
      try {
        await window.SS_API.Pipelines.update(id, { isDefault: true });
        await loadPipelines();
        var p = _allPipelines.find(function(x) { return x.id === id; });
        if (window.SS_toast) window.SS_toast((p ? p.name : "Pipeline") + " set as default", { sub: "All new deals will use this pipeline" });
        if (window.SS_closeSlide) window.SS_closeSlide();
      } catch(e) {
        if (window.SS_toast) window.SS_toast("Failed to set default", { sub: (e && e.message) || "Try again" });
      }
    };

    // Called by chrome.js slides after create/update/delete
    window.SS_reloadPipelines = loadPipelines;

    loadPipelines();
  </script>
  <script src="assets/chrome.js"></script>
</body>
</html>
