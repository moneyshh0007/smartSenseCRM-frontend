<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tasks · SmartSense CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="tasks" class="">
  <div class="app">
    <div data-sidebar></div>
    <main class="main">
      <div class="topbar">
        <div class="breadcrumb"><span>Records</span><span class="sep">/</span><span class="current">Tasks</span></div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications">○</button>
          <button class="icon-btn" title="Help">?</button>
        </div>
      </div>
      <div class="content">

  <div class="page-header">
    <div>
      <div class="eyebrow">M3 · F3.1</div>
      <h1 class="page-title mt-2">Tasks</h1>
      <div class="page-sub" id="tasks-sub">Loading tasks...</div>
    </div>
    <div class="row gap-2">
      <button class="btn">Group by deal</button>
      <button class="btn primary" id="new-task-btn">+ New task</button>
    </div>
  </div>

  <div class="row mb-4">
    <div class="tab-bar">
      <a href="#" class="active" id="tab-open" onclick="switchTab('open')">Open</a>
      <a href="#" id="tab-completed" onclick="switchTab('completed')">Completed</a>
    </div>
  </div>

  <!-- Bulk action toolbar (hidden until tasks are selected) -->
  <div class="bulk-toolbar" id="bulk-toolbar">
    <span class="bulk-count" id="bulk-count">0 selected</span>
    <div class="bulk-divider"></div>
    <button class="bulk-action" onclick="bulkComplete()">✓ Mark completed</button>
    <button class="bulk-action danger" onclick="bulkDelete()">✕ Delete task</button>
    <button class="bulk-clear" onclick="clearSelection()">✕ Clear</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th style="width:32px;"><input type="checkbox" id="select-all-tasks" onchange="toggleSelectAll(this)" /></th>
        <th>Task</th>
        <th>Due</th>
        <th>Priority</th>
        <th>Owner</th>
      </tr>
    </thead>
    <tbody id="tasks-tbody">
      <tr>
        <td colspan="5" style="text-align:center; padding:40px; color:var(--ink-50);">
          Loading...
        </td>
      </tr>
    </tbody>
  </table>

  <div class="row between mt-5">
    <div class="text-mono text-muted" style="font-size:11px;" id="tasks-footer"></div>
  </div>


      </div>
    </main>
  </div>

  <script src="assets/api.js"></script>
  <script>
    if (!SS_API.Auth.isLoggedIn()) window.location.href = "index.html";

    var currentTab = "open";

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tab-open").className      = tab === "open"      ? "active" : "";
      document.getElementById("tab-completed").className = tab === "completed" ? "active" : "";
      clearSelection();
      loadTasks();
    }

    // ── Selection helpers ────────────────────────────────────────────────
    function getSelectedIds() {
      return Array.from(document.querySelectorAll("#tasks-tbody input[type=checkbox]:checked"))
        .map(function(cb) { return cb.getAttribute("data-id"); })
        .filter(Boolean);
    }

    function updateBulkBar() {
      var ids     = getSelectedIds();
      var toolbar = document.getElementById("bulk-toolbar");
      var count   = document.getElementById("bulk-count");
      var allCb   = document.getElementById("select-all-tasks");
      var total   = document.querySelectorAll("#tasks-tbody input[type=checkbox][data-id]").length;

      count.textContent = ids.length + " selected";
      toolbar.classList.toggle("show", ids.length > 0);

      if (allCb) {
        allCb.indeterminate = ids.length > 0 && ids.length < total;
        allCb.checked       = total > 0 && ids.length === total;
      }
    }

    function toggleSelectAll(headerCb) {
      document.querySelectorAll("#tasks-tbody input[type=checkbox][data-id]").forEach(function(cb) {
        cb.checked = headerCb.checked;
      });
      updateBulkBar();
    }

    function clearSelection() {
      document.querySelectorAll("#tasks-tbody input[type=checkbox]").forEach(function(cb) { cb.checked = false; });
      var allCb = document.getElementById("select-all-tasks");
      if (allCb) { allCb.checked = false; allCb.indeterminate = false; }
      document.getElementById("bulk-toolbar").classList.remove("show");
    }

    function filterTasks(query) {
      var q = query.toLowerCase();
      document.querySelectorAll("#tasks-tbody tr").forEach(function(row) {
        var text = row.textContent.toLowerCase();
        row.style.display = (!q || text.includes(q)) ? "" : "none";
      });
    }

    // ── Bulk actions ─────────────────────────────────────────────────────
    async function bulkComplete() {
      var ids = getSelectedIds();
      if (!ids.length) return;
      try {
        await Promise.all(ids.map(function(id) { return SS_API.Tasks.update(id, { completed: true }); }));
        clearSelection();
        loadTasks();
      } catch (err) {
        console.error("Bulk complete failed:", err);
        alert("Some tasks could not be marked complete.");
      }
    }

    async function bulkDelete() {
      var ids = getSelectedIds();
      if (!ids.length) return;
      if (!confirm("Delete " + ids.length + " task" + (ids.length !== 1 ? "s" : "") + "? This cannot be undone.")) return;

      var results = await Promise.allSettled(
        ids.map(function(id) { return SS_API.Tasks.delete(id); })
      );

      // null response = successful 204 No Content, not a failure
      var failed = results.filter(function(r) {
        return r.status === "rejected" && r.reason != null;
      });

      clearSelection();
      await loadTasks();

      if (failed.length > 0) {
        var reason = failed[0].reason && failed[0].reason.message
          ? failed[0].reason.message
          : "Unknown error";
        alert(failed.length + " task(s) could not be deleted: " + reason);
      }
    }

    // ── Load tasks ───────────────────────────────────────────────────────
    async function loadTasks() {
      try {
        var params = currentTab === "open" ? { completed: "false" } : { completed: "true" };
        var data   = await SS_API.Tasks.list(params);
        var tbody  = document.getElementById("tasks-tbody");
        var sub    = document.getElementById("tasks-sub");
        var footer = document.getElementById("tasks-footer");

        sub.textContent    = data.total + " " + currentTab + " tasks · Live from database";
        footer.textContent = "SHOWING " + data.total + " TASKS";

        if (data.tasks.length === 0) {
          tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;padding:40px;color:var(--ink-50);'>" +
            (currentTab === "open" ? "You're all caught up ✓" : "No completed tasks yet.") +
            "</td></tr>";
          return;
        }

        tbody.innerHTML = data.tasks.map(function(t) {
          var due        = t.dueAt ? new Date(t.dueAt).toLocaleString() : "No due date";
          var priority   = t.priority || "med";
          var badgeClass = priority === "high" ? "badge" : "badge muted";
          var isOverdue  = t.dueAt && !t.completed && new Date(t.dueAt) < new Date();
          return "<tr>" +
            "<td><input type='checkbox' data-id='" + t.id + "' onchange=\"updateBulkBar()\" /></td>" +
            "<td>" +
              "<strong style='" + (t.completed ? "text-decoration:line-through;opacity:0.5;" : "") + "'>" + t.title + "</strong>" +
              (isOverdue ? " <span class='badge warn'>OVERDUE</span>" : "") +
            "</td>" +
            "<td style='" + (isOverdue ? "color:var(--ink);font-weight:500;" : "") + "'>" + due + "</td>" +
            "<td><span class='" + badgeClass + "'>" + priority.toUpperCase() + "</span></td>" +
            "<td>—</td>" +
            "</tr>";
        }).join("");

      } catch (err) {
        console.error("Failed to load tasks:", err);
        document.getElementById("tasks-tbody").innerHTML =
          "<tr><td colspan='5' style='text-align:center;padding:40px;color:var(--ink-50);'>Failed to load tasks. Please refresh.</td></tr>";
      }
    }

    window.SS_loadTasks = loadTasks;
    loadTasks();
  </script>
  <script src="assets/chrome.js"></script>
</body>
</html>
